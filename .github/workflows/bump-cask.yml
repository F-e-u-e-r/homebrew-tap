# Tap-local auto-bump: polls the app repo's latest alpha release and updates the
# cask (version + sha256) using THIS repo's own GITHUB_TOKEN — no cross-repo token.
name: bump-cask
on:
  schedule:
    - cron: "17 */6 * * *"   # every 6h
  workflow_dispatch: {}
permissions:
  contents: write
jobs:
  bump:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Bump cask to latest ai-pet-usage alpha release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          REPO="F-e-u-e-r/ai-pet-usage"
          TAG=$(gh release list --repo "$REPO" --limit 30 \
                  --json tagName,isDraft,isPrerelease,publishedAt \
                  --jq 'map(select(.isDraft|not)) | map(select(.tagName|startswith("alpha-v"))) | sort_by(.publishedAt) | reverse | (.[0].tagName // "")')
          if [ -z "$TAG" ]; then echo "no alpha-v* release found"; exit 0; fi
          VERSION="${TAG#alpha-v}"
          URL="https://github.com/${REPO}/releases/download/${TAG}/AI-Pet-Usage-${TAG}-arm64.zip"
          CASK="Casks/ai-pet-usage.rb"
          CUR=$(sed -nE 's/^  version "(.*)"/\1/p' "$CASK" | head -1)
          if [ "$CUR" = "$VERSION" ]; then echo "cask already at $VERSION"; exit 0; fi
          SHA=$(curl -fsSL "$URL" | sha256sum | awk '{print $1}')
          [ -n "$SHA" ] || { echo "failed to hash $URL"; exit 1; }
          sed -i -E "s/^  version \"[^\"]+\"/  version \"${VERSION}\"/" "$CASK"
          sed -i -E "s/^  sha256 \"[0-9a-f]+\"/  sha256 \"${SHA}\"/" "$CASK"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -am "ai-pet-usage ${VERSION}"
          git push
